<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>世界史クイズ50問</title>

<style>

body{
    margin:0;
    font-family:sans-serif;
    background:#f4efe3;
}

/* 全体 */
.container{
    display:flex;
    justify-content:center;
    align-items:flex-start;
    min-height:100vh;
}

/* 左右広告 */
.ad-left,
.ad-right{
    width:180px;
    min-height:100vh;
    background:#ddd;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding-top:20px;
    box-sizing:border-box;
    position:sticky;
    top:0;
}

/* 広告 */
.ad-box{
    width:160px;
    height:600px;
    background:white;
    border:2px dashed #999;
    border-radius:12px;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#666;
    font-size:20px;
}

/* メイン */
.main{
    flex:1;
    max-width:900px;
    padding:30px;
    box-sizing:border-box;
}

.quiz-box{
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

h1{
    text-align:center;
    color:#6b3f1d;
}

#count{
    text-align:center;
    margin-bottom:15px;
    font-size:18px;
}

#question{
    font-size:28px;
    text-align:center;
    margin:30px 0;
    font-weight:bold;
}

.choice{
    display:block;
    width:100%;
    margin:12px 0;
    padding:16px;
    font-size:20px;
    border:none;
    border-radius:12px;
    background:#e8d6bd;
    cursor:pointer;
    transition:0.2s;
}

.choice:hover{
    background:#d2b48c;
    transform:scale(1.02);
}

.choice:disabled{
    opacity:0.9;
    cursor:default;
}

#result{
    text-align:center;
    font-size:26px;
    margin-top:25px;
    min-height:40px;
    font-weight:bold;
}

#score{
    text-align:center;
    margin-top:20px;
    font-size:22px;
}

/* スマホ */
@media(max-width:1000px){

.ad-left,
.ad-right{
    display:none;
}

.main{
    width:100%;
    padding:15px;
}

#question{
    font-size:22px;
}

.choice{
    font-size:18px;
}

}

</style>
</head>

<body>

<div class="container">

    <!-- 左広告 -->
    <div class="ad-left">
        <div class="ad-box">
            <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8398161859137802"
     crossorigin="anonymous"></script>
<!-- チェス -->
<ins class="adsbygoogle"
     style="display:block"
     data-ad-client="ca-pub-8398161859137802"
     data-ad-slot="5599163841"
     data-ad-format="auto"
     data-full-width-responsive="true"></ins>
<script>
     (adsbygoogle = window.adsbygoogle || []).push({});
</script>
        </div>
    </div>

    <!-- メイン -->
    <div class="main">

        <div class="quiz-box">

            <h1>🌍 世界史クイズ50問</h1>

            <div id="count"></div>

            <div id="question"></div>

            <div id="choices"></div>

            <div id="result"></div>

            <div id="score"></div>

        </div>

    </div>

    <!-- 右広告 -->
    <div class="ad-right">
        <div class="ad-box">
            <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8398161859137802"
     crossorigin="anonymous"></script>
<!-- チェス -->
<ins class="adsbygoogle"
     style="display:block"
     data-ad-client="ca-pub-8398161859137802"
     data-ad-slot="5599163841"
     data-ad-format="auto"
     data-full-width-responsive="true"></ins>
<script>
     (adsbygoogle = window.adsbygoogle || []).push({});
</script>
        </div>
    </div>

</div>

<script>

/* =========================
   問題データ 50問
========================= */

const quizData = [

{ question:"古代エジプトで王を何と呼んだ？", choices:["ファラオ","カエサル","スルタン","皇帝"], answer:"ファラオ" },
{ question:"ピラミッドが多く作られた文明は？", choices:["エジプト文明","インダス文明","メソポタミア文明","黄河文明"], answer:"エジプト文明" },
{ question:"ハンムラビ法典を作った王は？", choices:["ハンムラビ王","始皇帝","ネロ","アレクサンドロス"], answer:"ハンムラビ王" },
{ question:"ローマ帝国初代皇帝は？", choices:["アウグストゥス","ネロ","カエサル","トラヤヌス"], answer:"アウグストゥス" },
{ question:"キリスト教を公認したローマ皇帝は？", choices:["コンスタンティヌス","ネロ","カエサル","ハドリアヌス"], answer:"コンスタンティヌス" },
{ question:"中国を初めて統一した皇帝は？", choices:["始皇帝","武帝","劉邦","孔子"], answer:"始皇帝" },
{ question:"儒教を始めた人物は？", choices:["孔子","老子","孫子","孟子"], answer:"孔子" },
{ question:"イスラム教を始めた人物は？", choices:["ムハンマド","イエス","ブッダ","モーセ"], answer:"ムハンマド" },
{ question:"フランク王国の有名な王は？", choices:["カール大帝","ルイ14世","ナポレオン","ピピン"], answer:"カール大帝" },
{ question:"十字軍が目指した聖地は？", choices:["エルサレム","ローマ","メッカ","アテネ"], answer:"エルサレム" },

{ question:"モンゴル帝国を築いた人物は？", choices:["チンギス・ハン","フビライ","ティムール","始皇帝"], answer:"チンギス・ハン" },
{ question:"元を建国した人物は？", choices:["フビライ・ハン","チンギス・ハン","オゴタイ","ティムール"], answer:"フビライ・ハン" },
{ question:"ルネサンスが始まった地域は？", choices:["イタリア","フランス","ドイツ","イギリス"], answer:"イタリア" },
{ question:"『モナ・リザ』を描いた人物は？", choices:["レオナルド・ダ・ヴィンチ","ミケランジェロ","ラファエロ","ゴッホ"], answer:"レオナルド・ダ・ヴィンチ" },
{ question:"宗教改革を始めた人物は？", choices:["ルター","カルヴァン","ガリレオ","コロンブス"], answer:"ルター" },
{ question:"アメリカ大陸に到達した人物は？", choices:["コロンブス","マゼラン","クック","バスコ・ダ・ガマ"], answer:"コロンブス" },
{ question:"インド航路を開いた人物は？", choices:["バスコ・ダ・ガマ","コロンブス","マゼラン","クック"], answer:"バスコ・ダ・ガマ" },
{ question:"世界一周を達成した船隊を率いた人物は？", choices:["マゼラン","コロンブス","クック","鄭和"], answer:"マゼラン" },
{ question:"フランス革命が始まった年は？", choices:["1789年","1776年","1815年","1848年"], answer:"1789年" },
{ question:"フランス革命で襲撃された監獄は？", choices:["バスティーユ牢獄","ロンドン塔","アルカトラズ","ベルサイユ宮殿"], answer:"バスティーユ牢獄" },

{ question:"ナポレオンが皇帝になった国は？", choices:["フランス","イギリス","ドイツ","ロシア"], answer:"フランス" },
{ question:"ナポレオンが敗れた戦いは？", choices:["ワーテルローの戦い","トラファルガー海戦","百年戦争","ポエニ戦争"], answer:"ワーテルローの戦い" },
{ question:"アメリカ独立宣言が出された年は？", choices:["1776年","1789年","1812年","1861年"], answer:"1776年" },
{ question:"アメリカ初代大統領は？", choices:["ワシントン","リンカーン","ジェファソン","ルーズベルト"], answer:"ワシントン" },
{ question:"産業革命が最初に起こった国は？", choices:["イギリス","フランス","ドイツ","アメリカ"], answer:"イギリス" },
{ question:"蒸気機関を改良した人物は？", choices:["ジェームズ・ワット","ニュートン","エジソン","ガリレオ"], answer:"ジェームズ・ワット" },
{ question:"ドイツ統一を進めた人物は？", choices:["ビスマルク","ヒトラー","ナポレオン","ルター"], answer:"ビスマルク" },
{ question:"イタリア統一運動で活躍した人物は？", choices:["ガリバルディ","ビスマルク","リンカーン","マルクス"], answer:"ガリバルディ" },
{ question:"第一次世界大戦が始まった年は？", choices:["1914年","1918年","1939年","1945年"], answer:"1914年" },
{ question:"第一次世界大戦のきっかけは？", choices:["サラエボ事件","満州事変","真珠湾攻撃","ロシア革命"], answer:"サラエボ事件" },

{ question:"第一次世界大戦後に作られた組織は？", choices:["国際連盟","国際連合","EU","NATO"], answer:"国際連盟" },
{ question:"第二次世界大戦が始まった年は？", choices:["1939年","1914年","1941年","1945年"], answer:"1939年" },
{ question:"第二次世界大戦が終わった年は？", choices:["1945年","1939年","1918年","1950年"], answer:"1945年" },
{ question:"国際連合が成立した年は？", choices:["1945年","1919年","1939年","1955年"], answer:"1945年" },
{ question:"冷戦で対立した国は？", choices:["アメリカとソ連","日本と中国","イギリスとフランス","ドイツとイタリア"], answer:"アメリカとソ連" },
{ question:"ベルリンの壁が崩壊した年は？", choices:["1989年","1991年","1975年","2001年"], answer:"1989年" },
{ question:"ソ連が崩壊した年は？", choices:["1991年","1989年","1945年","2000年"], answer:"1991年" },
{ question:"インド独立運動で有名な人物は？", choices:["ガンディー","ネルソン・マンデラ","毛沢東","ホー・チ・ミン"], answer:"ガンディー" },
{ question:"南アフリカでアパルトヘイト撤廃に貢献した人物は？", choices:["ネルソン・マンデラ","ガンディー","キング牧師","チャーチル"], answer:"ネルソン・マンデラ" },
{ question:"中華人民共和国が成立した年は？", choices:["1949年","1911年","1937年","1966年"], answer:"1949年" },

{ question:"清を倒した革命は？", choices:["辛亥革命","文化大革命","フランス革命","名誉革命"], answer:"辛亥革命" },
{ question:"ロシア革命が起きた年は？", choices:["1917年","1905年","1914年","1929年"], answer:"1917年" },
{ question:"ロシア革命を指導した人物は？", choices:["レーニン","スターリン","ゴルバチョフ","ニコライ2世"], answer:"レーニン" },
{ question:"世界恐慌が始まった年は？", choices:["1929年","1919年","1939年","1945年"], answer:"1929年" },
{ question:"ニューディール政策を行った大統領は？", choices:["フランクリン・ルーズベルト","リンカーン","ワシントン","トルーマン"], answer:"フランクリン・ルーズベルト" },
{ question:"イギリスで起きた王権制限の革命は？", choices:["名誉革命","フランス革命","辛亥革命","ロシア革命"], answer:"名誉革命" },
{ question:"イギリス議会が王に認めさせた文書は？", choices:["権利の章典","独立宣言","人権宣言","マグナ・カルタ"], answer:"権利の章典" },
{ question:"1215年に認められた文書は？", choices:["マグナ・カルタ","権利の章典","人権宣言","憲法十七条"], answer:"マグナ・カルタ" },
{ question:"アヘン戦争で清と戦った国は？", choices:["イギリス","フランス","ロシア","日本"], answer:"イギリス" },
{ question:"第一次世界大戦後、ドイツに厳しい条件を課した条約は？", choices:["ベルサイユ条約","ポーツマス条約","南京条約","ウィーン条約"], answer:"ベルサイユ条約" }
];

let currentQuestion = 0;
let score = 0;
let answered = false;

/* 問題表示 */
function showQuestion(){

answered = false;

const q = quizData[currentQuestion];

document.getElementById("count").textContent =
`${currentQuestion + 1} / ${quizData.length} 問`;

document.getElementById("question").textContent =
q.question;

document.getElementById("choices").innerHTML = "";

document.getElementById("result").textContent = "";

q.choices.forEach(choice => {

const button = document.createElement("button");

button.textContent = choice;

button.className = "choice";

button.onclick = () => checkAnswer(choice);

document.getElementById("choices").appendChild(button);

});

document.getElementById("score").textContent =
`スコア： ${score}`;

}

/* 回答 */
function checkAnswer(choice){

if(answered) return;

answered = true;

const correct = quizData[currentQuestion].answer;

const buttons =
document.querySelectorAll(".choice");

/* ボタン停止 */
buttons.forEach(btn => {

btn.disabled = true;

if(btn.textContent === correct){

btn.style.background = "#8fd694";

}

if(btn.textContent === choice &&
choice !== correct){

btn.style.background = "#ff9b9b";

}

});

if(choice === correct){

document.getElementById("result").textContent =
"⭕ 正解！";

document.getElementById("result").style.color =
"green";

score++;

}else{

document.getElementById("result").textContent =
`❌ 不正解！ 正解は「${correct}」`;

document.getElementById("result").style.color =
"red";

}

document.getElementById("score").textContent =
`スコア： ${score}`;

/* 自動で次へ */
setTimeout(() => {

currentQuestion++;

if(currentQuestion < quizData.length){

showQuestion();

}else{

showFinal();

}

}, 1500);

}

/* 終了 */
function showFinal(){

document.getElementById("count").textContent = "";

document.getElementById("question").textContent =
"🎉 クイズ終了！";

document.getElementById("choices").innerHTML = "";

document.getElementById("result").innerHTML =
`${quizData.length}問中<br><br>
<b style="font-size:42px;color:#6b3f1d;">
${score}問正解！
</b>`;

document.getElementById("score").textContent = "";

/* 再スタート */
const restartBtn =
document.createElement("button");

restartBtn.textContent =
"もう一度遊ぶ";

restartBtn.className =
"choice";

restartBtn.onclick = () => {

currentQuestion = 0;
score = 0;

showQuestion();

};

document.getElementById("choices")
.appendChild(restartBtn);

}

/* 開始 */
showQuestion();

</script>

</body>
</html>
